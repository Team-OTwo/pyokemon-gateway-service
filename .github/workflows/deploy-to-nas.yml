name: Deploy to Synology NAS

on:
  push:
    branches: [ develop ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/gateway-service:latest

      - name: Deploy to Synology NAS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          port: ${{ secrets.NAS_SSH_PORT }}
          key: ${{ secrets.NAS_SSH_PRIVATE_KEY }}
          script: |
            cd /volume1/docker/pyokemon/gateway-service
            
            # Docker 이미지 최신 버전 가져오기
            echo "최신 Docker 이미지 다운로드"
            docker pull ghcr.io/${{ github.repository }}/gateway-service:latest
            
            # 기존 컨테이너 중지 및 삭제
            echo "기존 컨테이너 정리"
            docker stop gateway-service || true
            docker rm gateway-service || true
            
            # 새 컨테이너 실행
            echo "새 컨테이너 실행"
            docker run -d \
              --name gateway-service \
              --restart unless-stopped \
              -e SPRING_PROFILES_ACTIVE=dev \
              -v /volume1/docker/pyokemon/gateway-service/logs:/app/logs \
              --network pyokemon-network \
              ghcr.io/${{ github.repository }}/gateway-service:latest
            
            echo "배포 완료"