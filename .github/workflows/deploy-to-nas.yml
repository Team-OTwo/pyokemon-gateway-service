name: Deploy to Synology NAS

on:
  push:
    branches: [ develop ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Build and export Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: pyokemon/gateway-service:latest
          
      - name: Save Docker image
        run: |
          docker save pyokemon/gateway-service:latest > gateway-service-image.tar
          ls -la gateway-service-image.tar

      - name: Deploy Docker image to Synology NAS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          port: ${{ secrets.NAS_SSH_PORT }}
          key: ${{ secrets.NAS_SSH_PRIVATE_KEY }}
          source: "gateway-service-image.tar"
          target: "/volume1/docker/pyokemon/gateway-service"

      - name: Check Docker installation on NAS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          port: ${{ secrets.NAS_SSH_PORT }}
          key: ${{ secrets.NAS_SSH_PRIVATE_KEY }}
          script: |
            echo "현재 경로: $(pwd)"
            echo "환경 변수 PATH: $PATH"
            echo "현재 사용자: $(whoami)"
            echo "사용자 그룹: $(groups)"
            
            # Docker 실행 파일 위치 확인
            which docker || echo "Docker 실행 파일을 찾을 수 없습니다."
            
            # Docker 그룹 확인
            getent group docker || echo "docker 그룹이 존재하지 않습니다."

      - name: Start Docker container on NAS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          port: ${{ secrets.NAS_SSH_PORT }}
          key: ${{ secrets.NAS_SSH_PRIVATE_KEY }}
          script: |
            cd /volume1/docker/pyokemon/gateway-service
            
            # Docker 경로 설정
            export PATH="/usr/local/bin:/usr/bin:/volume1/@appstore/Docker/usr/bin:$PATH"
            
            # sudo로 권한 확보하여 Docker 명령어 실행
            echo "Docker 버전 확인"
            sudo docker version || echo "Docker 버전 확인 실패"
            
            echo "Docker 이미지 로드 시작"
            sudo docker load < gateway-service-image.tar || echo "Docker 이미지 로드 실패"
            
            # 기존 컨테이너 중지 및 삭제
            echo "기존 컨테이너 확인"
            sudo docker ps -a | grep gateway-service || echo "실행 중인 gateway-service 컨테이너 없음"
            
            if sudo docker ps -a --filter "name=gateway-service" --format "{{.ID}}" | grep -q .; then
              echo "기존 컨테이너 중지 중..."
              sudo docker stop gateway-service || echo "컨테이너 중지 실패"
              echo "기존 컨테이너 삭제 중..."
              sudo docker rm gateway-service || echo "컨테이너 삭제 실패"
            fi
            
            # 새 컨테이너 실행
            echo "새 컨테이너 실행 중..."
            sudo docker run -d \
              --name gateway-service \
              --restart always \
              -p 8086:8086 \
              -v /volume1/docker/pyokemon/gateway-service/logs:/app/logs \
              pyokemon/gateway-service:latest || echo "컨테이너 실행 실패"
              
            # 컨테이너 상태 확인
            echo "컨테이너 상태:"
            sudo docker ps | grep gateway-service || echo "컨테이너가 실행되지 않음"
            echo "Docker 로그:"
            sudo docker logs gateway-service || echo "로그 확인 실패"
            echo "Docker 배포 완료"