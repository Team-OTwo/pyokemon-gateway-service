name: Deploy to Synology NAS

on:
  push:
    branches: [ develop ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Deploy to Synology NAS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          port: ${{ secrets.NAS_SSH_PORT }}
          key: ${{ secrets.NAS_SSH_PRIVATE_KEY }}
          source: "build/libs/*.jar"
          target: "/volume1/docker/pyokemon/gateway-service"
          strip_components: 2

      - name: Restart Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          port: ${{ secrets.NAS_SSH_PORT }}
          key: ${{ secrets.NAS_SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            if ps -ef | grep "java.*gateway-service" | grep -v grep > /dev/null; then
              ps -ef | grep "java.*gateway-service" | grep -v grep | awk '{print $2}' | xargs kill
              sleep 5
            fi
            nohup java -jar gateway-service-0.0.1.jar > app.log 2>&1 &
            echo "배포 완료"