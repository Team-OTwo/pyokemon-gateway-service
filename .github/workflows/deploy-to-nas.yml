name: Deploy to Synology NAS

on:
  push:
    branches: [ develop ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Build and export Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: pyokemon/gateway-service:latest
          
      - name: Save Docker image
        run: |
          docker save pyokemon/gateway-service:latest > gateway-service-image.tar
          ls -la gateway-service-image.tar

      - name: Deploy Docker image to Synology NAS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          port: ${{ secrets.NAS_SSH_PORT }}
          key: ${{ secrets.NAS_SSH_PRIVATE_KEY }}
          source: "gateway-service-image.tar"
          target: "/volume1/docker/pyokemon/gateway-service"

      - name: Start Docker container on NAS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          port: ${{ secrets.NAS_SSH_PORT }}
          key: ${{ secrets.NAS_SSH_PRIVATE_KEY }}
          script: |
            cd /volume1/docker/pyokemon/gateway-service
            
            # 이미지 로드
            docker load < gateway-service-image.tar
            
            # 기존 컨테이너 중지 및 삭제
            if docker ps -a --filter "name=gateway-service" --format "{{.ID}}" | grep -q .; then
              docker stop gateway-service || true
              docker rm gateway-service || true
              echo "기존 컨테이너 삭제 완료"
            fi
            
            # 새 컨테이너 실행
            docker run -d \
              --name gateway-service \
              --restart always \
              -p 8086:8086 \
              -v /volume1/docker/pyokemon/gateway-service/logs:/app/logs \
              pyokemon/gateway-service:latest
              
            # 컨테이너 상태 확인
            docker ps | grep gateway-service
            echo "Docker 배포 완료"