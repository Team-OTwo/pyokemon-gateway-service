server:
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: gatewaypassword
    key-store-type: PKCS12
    key-alias: gateway-service
    client-auth: none

management:
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
    otlp:
      endpoint: http://tempo:4317
    enabled: true
  otlp:
    tracing:
      endpoint: http://tempo:4317
  metrics:
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus


logging:
  level:
    com.pyokemon: DEBUG
  config: classpath:log4j2.xml

spring:
  cloud:
    gateway:
      mvc:
        routes:
          # Account 서비스 라우팅
          - id: account-service
            predicates:
              - Path=/account/**
            uri: http://account-service:8080
            filters:
            # 임시로 인증 헤더 필터 제거
            - AddAuthenticationHeader
            # - RewritePath=/account/(?<segment>.*), /account/api/$\{segment}

          # Event 서비스 라우팅
          - id: event-service
            predicates:
              - Path=/event/**
            uri: http://event-service:8081
            filters:
            # 임시로 인증 헤더 필터 제거
            - AddAuthenticationHeader
            # - RewritePath=/event/(?<segment>.*), /event/api/$\{segment}

          # Payment 서비스 라우팅
          - id: payment-service
            predicates:
              - Path=/payment/**
            uri: http://payment-service:8082
            filters:
            - AddAuthenticationHeader
            # - RewritePath=/payment/(?<segment>.*), /payment/api/$\{segment}

          # DID 서비스 라우팅
          - id: did-service
            predicates:
              - Path=/did/**
            uri: http://did-service:8084
            filters:
            - AddAuthenticationHeader
            # - RewritePath=/did/(?<segment>.*), /did/api/$\{segment}

          # Notification 서비스 라우팅
          - id: noti-service
            predicates:
              - Path=/noti/**
            uri: http://noti-service:8085
            filters:
            - AddAuthenticationHeader
            # - RewritePath=/noti/(?<segment>.*), /noti/api/$\{segment}

          # BFF 서비스 라우팅
          - id: bff-service
            predicates:
              - Path=/bff/**
            uri: http://bff-service:8086
            filters:
            - AddAuthenticationHeader
            # - RewritePath=/bff/(?<segment>.*), /bff/api/$\{segment}

          # Booking 서비스 라우팅
          - id: booking-service
            predicates:
              - Path=/booking/**
            uri: http://localhost:8088
            filters:
              - AddAuthenticationHeader
            # - RewritePath=/bff/(?<segment>.*), /bff/api/$\{segment}